
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--col-new:#E6F1FB;--col-new-b:#378ADD;--col-contact:#EEEDFE;--col-contact-b:#7F77DD;--col-qual:#EAF3DE;--col-qual-b:#639922;--col-prop:#FAEEDA;--col-prop-b:#BA7517;--col-won:#E1F5EE;--col-won-b:#1D9E75;--col-lost:#FCEBEB;--col-lost-b:#E24B4A}
body{font-family:var(--font-sans,system-ui);background:transparent;color:var(--color-text-primary)}
.app{display:flex;flex-direction:column;min-height:600px}
nav{display:flex;gap:4px;padding:12px 0 0;border-bottom:0.5px solid var(--color-border-tertiary);margin-bottom:0}
.tab{padding:8px 16px;font-size:13px;cursor:pointer;border:none;background:none;color:var(--color-text-secondary);border-bottom:2px solid transparent;margin-bottom:-0.5px;font-family:inherit;font-weight:400;transition:color 0.15s}
.tab.active{color:var(--color-text-primary);border-bottom-color:var(--color-text-primary);font-weight:500}
.tab:hover:not(.active){color:var(--color-text-primary)}
.view{display:none;padding:16px 0}
.view.active{display:block}
.toolbar{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.toolbar input{flex:1;min-width:160px;padding:7px 10px;font-size:13px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);font-family:inherit}
.btn{padding:7px 14px;font-size:13px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);cursor:pointer;font-family:inherit;white-space:nowrap;transition:background 0.1s}
.btn:hover{background:var(--color-background-secondary)}
.btn.primary{background:var(--color-text-primary);color:var(--color-background-primary);border-color:var(--color-text-primary)}
.btn.primary:hover{opacity:0.85}
.btn.danger{color:var(--color-text-danger);border-color:var(--color-border-danger)}
.btn.danger:hover{background:var(--color-background-danger)}
.board{display:flex;gap:12px;overflow-x:auto;padding-bottom:8px}
.col{flex:0 0 220px;background:var(--color-background-secondary);border-radius:var(--border-radius-lg);padding:10px}
.col-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.col-title{font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:0.05em;color:var(--color-text-secondary)}
.col-badge{font-size:11px;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:20px;padding:1px 7px;color:var(--color-text-secondary)}
.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:10px;margin-bottom:8px;cursor:pointer;transition:border-color 0.15s}
.card:hover{border-color:var(--color-border-secondary)}
.card-name{font-size:13px;font-weight:500;margin-bottom:4px}
.card-co{font-size:12px;color:var(--color-text-secondary);margin-bottom:6px}
.card-val{font-size:12px;font-weight:500;color:var(--color-text-success)}
.card-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}
.tag{font-size:10px;padding:2px 6px;border-radius:20px;background:var(--color-background-info);color:var(--color-text-info);border:0.5px solid var(--color-border-info)}
.add-card{width:100%;text-align:left;font-size:12px;color:var(--color-text-tertiary);padding:6px 8px;background:none;border:0.5px dashed var(--color-border-tertiary);border-radius:var(--border-radius-md);cursor:pointer;font-family:inherit}
.add-card:hover{border-color:var(--color-border-secondary);color:var(--color-text-secondary)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:8px 10px;font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:0.05em;color:var(--color-text-secondary);border-bottom:0.5px solid var(--color-border-tertiary)}
td{padding:9px 10px;border-bottom:0.5px solid var(--color-border-tertiary);color:var(--color-text-primary)}
tr:hover td{background:var(--color-background-secondary)}
tr td:first-child{font-weight:500}
.status-pill{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500}
.s-new{background:var(--col-new);color:var(--col-new-b)}
.s-contacted{background:var(--col-contact);color:var(--col-contact-b)}
.s-qualified{background:var(--col-qual);color:var(--col-qual-b)}
.s-proposal{background:var(--col-prop);color:var(--col-prop-b)}
.s-won{background:var(--col-won);color:var(--col-won-b)}
.s-lost{background:var(--col-lost);color:var(--col-lost-b)}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:20px}
.stat-card{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:14px 16px}
.stat-label{font-size:12px;color:var(--color-text-secondary);margin-bottom:4px}
.stat-val{font-size:24px;font-weight:500}
.stat-sub{font-size:11px;color:var(--color-text-tertiary);margin-top:2px}
.funnel{margin-top:8px}
.funnel-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.funnel-label{font-size:12px;color:var(--color-text-secondary);width:80px;text-align:right}
.funnel-bar-wrap{flex:1;background:var(--color-background-secondary);border-radius:4px;height:20px;overflow:hidden}
.funnel-bar{height:100%;border-radius:4px;display:flex;align-items:center;padding-left:8px;font-size:11px;font-weight:500;color:white;transition:width 0.4s ease}
.funnel-count{font-size:12px;color:var(--color-text-secondary);width:24px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-lg);padding:20px;width:90%;max-width:440px;max-height:90vh;overflow-y:auto}
.modal h3{font-size:15px;font-weight:500;margin-bottom:16px}
.form-row{margin-bottom:12px}
.form-row label{display:block;font-size:12px;color:var(--color-text-secondary);margin-bottom:4px}
.form-row input,.form-row select,.form-row textarea{width:100%;padding:8px 10px;font-size:13px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);font-family:inherit}
.form-row textarea{resize:vertical;min-height:60px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.detail-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:0.5px solid var(--color-border-tertiary);font-size:13px}
.detail-row:last-child{border-bottom:none}
.detail-label{color:var(--color-text-secondary)}
.activity-item{padding:8px 0;border-bottom:0.5px solid var(--color-border-tertiary);font-size:13px}
.activity-item:last-child{border-bottom:none}
.activity-time{font-size:11px;color:var(--color-text-tertiary);margin-top:2px}
.section-title{font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:0.05em;color:var(--color-text-secondary);margin:14px 0 8px}
.avatar{width:32px;height:32px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;background:var(--color-background-info);color:var(--color-text-info);flex-shrink:0}
.contact-row{display:flex;align-items:center;gap:10px}
.note-box{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px;font-size:13px;color:var(--color-text-secondary);margin-top:8px;font-style:italic}
</style>

<h2 class="sr-only">Lead Tracking System — pipeline board, contacts, and analytics</h2>

<div class="app">
<nav>
  <button class="tab active" onclick="showTab('pipeline')">Pipeline</button>
  <button class="tab" onclick="showTab('contacts')">Contacts</button>
  <button class="tab" onclick="showTab('analytics')">Analytics</button>
</nav>

<div id="pipeline" class="view active">
  <div class="toolbar">
    <input type="text" id="pipe-search" placeholder="Search leads..." oninput="renderBoard()">
    <button class="btn primary" onclick="openAddLead()">+ Add Lead</button>
  </div>
  <div class="board" id="board"></div>
</div>

<div id="contacts" class="view">
  <div class="toolbar">
    <input type="text" id="con-search" placeholder="Search contacts..." oninput="renderContacts()">
    <select id="con-filter" onchange="renderContacts()" style="padding:7px 10px;font-size:13px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);font-family:inherit">
      <option value="">All stages</option>
      <option value="New">New</option>
      <option value="Contacted">Contacted</option>
      <option value="Qualified">Qualified</option>
      <option value="Proposal">Proposal</option>
      <option value="Won">Won</option>
      <option value="Lost">Lost</option>
    </select>
    <button class="btn primary" onclick="openAddLead()">+ Add Lead</button>
  </div>
  <table>
    <thead><tr>
      <th>Name</th><th>Company</th><th>Email</th><th>Stage</th><th>Value</th><th>Owner</th><th>Actions</th>
    </tr></thead>
    <tbody id="contacts-body"></tbody>
  </table>
</div>

<div id="analytics" class="view">
  <div class="stats-grid" id="stats-grid"></div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;flex-wrap:wrap">
    <div>
      <div class="section-title">Pipeline funnel</div>
      <div class="funnel" id="funnel"></div>
    </div>
    <div>
      <div class="section-title">Win rate by owner</div>
      <div id="owner-stats"></div>
    </div>
  </div>
  <div class="section-title" style="margin-top:20px">Recent activity</div>
  <div id="activity-log"></div>
</div>
</div>

<div id="modal-root"></div>

<script>
const STAGES = ['New','Contacted','Qualified','Proposal','Won','Lost'];
const STAGE_COLORS = {New:'s-new',Contacted:'s-contacted',Qualified:'s-qualified',Proposal:'s-proposal',Won:'s-won',Lost:'s-lost'};
const FUNNEL_COLORS = {New:'#378ADD',Contacted:'#7F77DD',Qualified:'#639922',Proposal:'#BA7517',Won:'#1D9E75',Lost:'#E24B4A'};
const OWNERS = ['Alex M.','Jordan B.','Riley K.','Sam T.'];

let leads = [
  {id:1,name:'Sarah Chen',company:'TechFlow Inc',email:'schen@techflow.com',phone:'312-555-0182',stage:'Proposal',value:18500,owner:'Alex M.',source:'Website',notes:'Interested in enterprise plan. Demo done.',tags:['Enterprise','Hot'],created:'2026-03-10'},
  {id:2,name:'Marcus Webb',company:'Webb & Associates',email:'m.webb@webbassoc.com',phone:'415-555-0234',stage:'Qualified',value:7200,owner:'Jordan B.',source:'Referral',notes:'Referred by Sarah Chen.',tags:['SMB'],created:'2026-03-15'},
  {id:3,name:'Priya Kapoor',company:'Kapoor Logistics',email:'priya@kapoorlog.com',phone:'312-555-0091',stage:'Won',value:32000,owner:'Alex M.',source:'LinkedIn',notes:'Closed Q1.',tags:['Enterprise','Closed'],created:'2026-02-01'},
  {id:4,name:'Tom Deluca',company:'Deluca Media',email:'tdeluca@delucamedia.com',phone:'630-555-0345',stage:'New',value:4500,owner:'Riley K.',source:'Cold Outreach',notes:'',tags:['SMB'],created:'2026-04-01'},
  {id:5,name:'Elena Voss',company:'Voss Retail Group',email:'evoss@vossretail.com',phone:'847-555-0123',stage:'Contacted',value:11000,owner:'Sam T.',source:'Trade Show',notes:'Met at NRF 2026.',tags:['Retail'],created:'2026-03-28'},
  {id:6,name:'James O\'Brien',company:'OBrien Tech',email:'james@obrientech.com',phone:'708-555-0267',stage:'Lost',value:9000,owner:'Jordan B.',source:'Website',notes:'Went with competitor.',tags:['Lost'],created:'2026-02-20'},
  {id:7,name:'Aisha Grant',company:'Grant Consulting',email:'aisha@grantco.com',phone:'773-555-0399',stage:'Qualified',value:6800,owner:'Riley K.',source:'Referral',notes:'Budget approved.',tags:['SMB','Hot'],created:'2026-04-05'},
  {id:8,name:'Derek Ng',company:'Ng Engineering',email:'dng@ngeng.com',phone:'312-555-0512',stage:'New',value:5100,owner:'Sam T.',source:'Google Ads',notes:'',tags:[],created:'2026-04-08'},
];

let activity = [
  {time:'2026-04-12 10:30',text:'Sarah Chen moved to Proposal',icon:'→'},
  {time:'2026-04-11 15:00',text:'Aisha Grant marked Qualified',icon:'✓'},
  {time:'2026-04-10 09:15',text:'Derek Ng added as new lead',icon:'+'},
  {time:'2026-04-09 14:00',text:'Priya Kapoor deal won — $32,000',icon:'★'},
  {time:'2026-04-08 11:30',text:'James O\'Brien marked Lost',icon:'✕'},
];

let nextId = 9;

function showTab(tab) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById(tab).classList.add('active');
  if(tab==='pipeline') renderBoard();
  if(tab==='contacts') renderContacts();
  if(tab==='analytics') renderAnalytics();
}

function stageClass(s){return STAGE_COLORS[s]||'s-new'}

function renderBoard() {
  const q = (document.getElementById('pipe-search').value||'').toLowerCase();
  const board = document.getElementById('board');
  board.innerHTML = '';
  STAGES.forEach(stage => {
    const cards = leads.filter(l=>l.stage===stage && (!q||(l.name+l.company).toLowerCase().includes(q)));
    const col = document.createElement('div');
    col.className = 'col';
    col.innerHTML = `<div class="col-head"><span class="col-title">${stage}</span><span class="col-badge">${cards.length}</span></div>`;
    cards.forEach(lead => {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `<div class="card-name">${lead.name}</div><div class="card-co">${lead.company}</div><div class="card-val">$${lead.value.toLocaleString()}</div>${lead.tags.length?`<div class="card-tags">${lead.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>`:''}<div style="font-size:11px;color:var(--color-text-tertiary);margin-top:6px">${lead.owner}</div>`;
      card.onclick = ()=>openDetail(lead.id);
      col.appendChild(card);
    });
    const addBtn = document.createElement('button');
    addBtn.className = 'add-card';
    addBtn.textContent = '+ Add lead';
    addBtn.onclick = ()=>openAddLead(stage);
    col.appendChild(addBtn);
    board.appendChild(col);
  });
}

function renderContacts() {
  const q = (document.getElementById('con-search').value||'').toLowerCase();
  const filter = document.getElementById('con-filter').value;
  const tbody = document.getElementById('contacts-body');
  tbody.innerHTML = '';
  leads.filter(l=>(!q||(l.name+l.company+l.email).toLowerCase().includes(q))&&(!filter||l.stage===filter))
    .forEach(l=>{
      tbody.innerHTML+=`<tr>
        <td><div class="contact-row"><div class="avatar">${l.name.split(' ').map(n=>n[0]).join('')}</div><span style="cursor:pointer;color:var(--color-text-info)" onclick="openDetail(${l.id})">${l.name}</span></div></td>
        <td>${l.company}</td>
        <td><a href="mailto:${l.email}" style="color:var(--color-text-info)">${l.email}</a></td>
        <td><span class="status-pill ${stageClass(l.stage)}">${l.stage}</span></td>
        <td>$${l.value.toLocaleString()}</td>
        <td>${l.owner}</td>
        <td><button class="btn" style="padding:4px 10px;font-size:12px" onclick="openDetail(${l.id})">View</button> <button class="btn danger" style="padding:4px 10px;font-size:12px" onclick="deleteLead(${l.id})">Del</button></td>
      </tr>`;
    });
}

function renderAnalytics() {
  const total = leads.reduce((s,l)=>s+l.value,0);
  const won = leads.filter(l=>l.stage==='Won');
  const active = leads.filter(l=>!['Won','Lost'].includes(l.stage));
  const pipeline = active.reduce((s,l)=>s+l.value,0);
  document.getElementById('stats-grid').innerHTML = `
    <div class="stat-card"><div class="stat-label">Total leads</div><div class="stat-val">${leads.length}</div></div>
    <div class="stat-card"><div class="stat-label">Pipeline value</div><div class="stat-val">$${Math.round(pipeline/1000)}k</div><div class="stat-sub">${active.length} active deals</div></div>
    <div class="stat-card"><div class="stat-label">Deals won</div><div class="stat-val">${won.length}</div><div class="stat-sub">$${won.reduce((s,l)=>s+l.value,0).toLocaleString()}</div></div>
    <div class="stat-card"><div class="stat-label">Win rate</div><div class="stat-val">${leads.filter(l=>['Won','Lost'].includes(l.stage)).length?Math.round(won.length/leads.filter(l=>['Won','Lost'].includes(l.stage)).length*100):0}%</div></div>
  `;
  const maxCount = Math.max(...STAGES.map(s=>leads.filter(l=>l.stage===s).length),1);
  document.getElementById('funnel').innerHTML = STAGES.map(s=>{
    const count = leads.filter(l=>l.stage===s).length;
    const pct = Math.round(count/maxCount*100);
    return `<div class="funnel-row">
      <span class="funnel-label">${s}</span>
      <div class="funnel-bar-wrap"><div class="funnel-bar" style="width:${pct}%;background:${FUNNEL_COLORS[s]}">${count>0?count:''}</div></div>
      <span class="funnel-count">${count}</span>
    </div>`;
  }).join('');
  const ownerStats = {};
  leads.forEach(l=>{if(!ownerStats[l.owner])ownerStats[l.owner]={won:0,total:0};ownerStats[l.owner].total++;if(l.stage==='Won')ownerStats[l.owner].won++;});
  document.getElementById('owner-stats').innerHTML = Object.entries(ownerStats).map(([owner,s])=>`
    <div class="funnel-row">
      <span class="funnel-label" style="width:68px">${owner.split(' ')[0]}</span>
      <div class="funnel-bar-wrap"><div class="funnel-bar" style="width:${Math.round(s.won/s.total*100)}%;background:#7F77DD">${s.won}</div></div>
      <span class="funnel-count" style="font-size:11px">${Math.round(s.won/s.total*100)}%</span>
    </div>`).join('');
  document.getElementById('activity-log').innerHTML = activity.map(a=>`
    <div class="activity-item"><span style="font-size:12px;margin-right:8px">${a.icon}</span>${a.text}<div class="activity-time">${a.time}</div></div>`).join('');
}

function openAddLead(stage) {
  const modal = document.getElementById('modal-root');
  modal.innerHTML = `<div class="modal-overlay" onclick="closeModal(event)"><div class="modal">
    <h3>Add New Lead</h3>
    <div class="form-row"><label>Name *</label><input id="f-name" placeholder="Full name"></div>
    <div class="form-row"><label>Company</label><input id="f-company" placeholder="Company name"></div>
    <div class="form-row"><label>Email</label><input id="f-email" type="email" placeholder="email@example.com"></div>
    <div class="form-row"><label>Phone</label><input id="f-phone" placeholder="555-000-0000"></div>
    <div class="form-row"><label>Deal Value ($)</label><input id="f-value" type="number" placeholder="0"></div>
    <div class="form-row"><label>Stage</label><select id="f-stage">${STAGES.map(s=>`<option ${s===(stage||'New')?'selected':''}>${s}</option>`).join('')}</select></div>
    <div class="form-row"><label>Owner</label><select id="f-owner">${OWNERS.map(o=>`<option>${o}</option>`).join('')}</select></div>
    <div class="form-row"><label>Source</label><input id="f-source" placeholder="Website, Referral, etc."></div>
    <div class="form-row"><label>Notes</label><textarea id="f-notes" placeholder="Add notes..."></textarea></div>
    <div class="modal-actions"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn primary" onclick="saveLead()">Save Lead</button></div>
  </div></div>`;
}

function saveLead() {
  const name = document.getElementById('f-name').value.trim();
  if(!name){alert('Name is required');return;}
  const lead = {
    id:nextId++,name,
    company:document.getElementById('f-company').value||'',
    email:document.getElementById('f-email').value||'',
    phone:document.getElementById('f-phone').value||'',
    value:parseInt(document.getElementById('f-value').value)||0,
    stage:document.getElementById('f-stage').value,
    owner:document.getElementById('f-owner').value,
    source:document.getElementById('f-source').value||'',
    notes:document.getElementById('f-notes').value||'',
    tags:[],created:new Date().toISOString().split('T')[0]
  };
  leads.push(lead);
  activity.unshift({time:new Date().toLocaleString(),text:`${name} added as new lead`,icon:'+'});
  closeModal();
  renderBoard();
}

function openDetail(id) {
  const l = leads.find(x=>x.id===id);
  if(!l)return;
  document.getElementById('modal-root').innerHTML = `<div class="modal-overlay" onclick="closeModal(event)"><div class="modal">
    <h3 style="display:flex;align-items:center;gap:10px"><div class="avatar">${l.name.split(' ').map(n=>n[0]).join('')}</div>${l.name}</h3>
    <div class="detail-row"><span class="detail-label">Company</span><span>${l.company||'—'}</span></div>
    <div class="detail-row"><span class="detail-label">Email</span><span><a href="mailto:${l.email}" style="color:var(--color-text-info)">${l.email||'—'}</a></span></div>
    <div class="detail-row"><span class="detail-label">Phone</span><span>${l.phone||'—'}</span></div>
    <div class="detail-row"><span class="detail-label">Value</span><span style="color:var(--color-text-success);font-weight:500">$${l.value.toLocaleString()}</span></div>
    <div class="detail-row"><span class="detail-label">Owner</span><span>${l.owner}</span></div>
    <div class="detail-row"><span class="detail-label">Source</span><span>${l.source||'—'}</span></div>
    <div class="detail-row"><span class="detail-label">Created</span><span>${l.created}</span></div>
    ${l.notes?`<div class="note-box">"${l.notes}"</div>`:''}
    <div class="section-title">Move stage</div>
    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px">
      ${STAGES.map(s=>`<button class="btn${l.stage===s?' primary':''}" style="padding:5px 12px;font-size:12px" onclick="moveStage(${id},'${s}')">${s}</button>`).join('')}
    </div>
    <div class="modal-actions"><button class="btn danger" onclick="deleteLead(${id},true)">Delete Lead</button><button class="btn" onclick="closeModal()">Close</button></div>
  </div></div>`;
}

function moveStage(id, stage) {
  const l = leads.find(x=>x.id===id);
  if(!l)return;
  const old = l.stage;
  l.stage = stage;
  activity.unshift({time:new Date().toLocaleString(),text:`${l.name} moved from ${old} to ${stage}`,icon:'→'});
  closeModal();
  renderBoard();
}

function deleteLead(id, fromModal) {
  if(!confirm('Delete this lead?'))return;
  const l = leads.find(x=>x.id===id);
  if(l)activity.unshift({time:new Date().toLocaleString(),text:`${l.name} deleted`,icon:'✕'});
  leads = leads.filter(x=>x.id!==id);
  if(fromModal)closeModal();
  renderBoard();
  renderContacts();
}

function closeModal(e) {
  if(!e||e.target.classList.contains('modal-overlay'))
    document.getElementById('modal-root').innerHTML='';
}

renderBoard();
</script>
