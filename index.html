
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0d0d10;color:#e8e6f0}
:root{
--bg:#0d0d10;--bg2:#141417;--bg3:#1c1c21;--bg4:#242429;--bg5:#2c2c33;
--border:#2a2a32;--border2:#38383f;
--text:#e8e6f0;--text2:#9896a8;--text3:#55546a;
--accent:#7c6af7;--accent2:#a99df8;--adim:#1e1a3f;
--green:#3dd68c;--gdim:#0f2d1f;
--amber:#f5a62a;--adim2:#2e1e05;
--red:#f25c5c;--rdim:#2d0f0f;
--blue:#4aa3e8;--bdim:#0a1e30;
--teal:#2dd4bf;--tdim:#052420;
--r:8px;--rl:12px;--rxl:16px
}
.app{display:flex;flex-direction:column;min-height:700px;background:var(--bg)}
header{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;gap:16px;height:52px;flex-shrink:0}
.logo{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:600;letter-spacing:-0.02em}
.logo-icon{width:24px;height:24px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center}
nav{display:flex;gap:2px}
.tab{padding:5px 14px;font-size:13px;border:1px solid transparent;border-radius:var(--r);background:none;color:var(--text3);cursor:pointer;font-family:inherit;font-weight:400;transition:all 0.15s}
.tab:hover{color:var(--text2)}
.tab.on{background:var(--bg4);border-color:var(--border);color:var(--text);font-weight:500}
.srch{margin-left:auto;position:relative}
.srch input{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:6px 10px 6px 30px;font-size:13px;color:var(--text);font-family:inherit;width:200px;outline:none}
.srch input:focus{border-color:var(--accent)}
.srch-ico{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:13px}
.add-btn{background:var(--accent);border:none;border-radius:var(--r);padding:7px 14px;font-size:13px;color:#fff;cursor:pointer;font-family:inherit;font-weight:500;white-space:nowrap}
.add-btn:hover{opacity:0.85}
main{flex:1;padding:18px 20px}
.view{display:none}.view.on{display:block}

.toolbar{display:flex;gap:8px;margin-bottom:14px;align-items:center}
.filt{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:6px 10px;font-size:13px;color:var(--text2);font-family:inherit;outline:none;cursor:pointer}
.filt:focus{border-color:var(--accent)}
.count{margin-left:auto;font-size:12px;color:var(--text3)}

.tbl-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden}
table{width:100%;border-collapse:collapse;table-layout:fixed}
thead tr{background:var(--bg3)}
th{padding:10px 14px;text-align:left;font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;border-bottom:1px solid var(--border);cursor:pointer;user-select:none;white-space:nowrap}
th:hover{color:var(--text2)}
td{padding:12px 14px;font-size:13px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr{cursor:pointer;transition:background 0.1s}
tbody tr:hover td{background:var(--bg3)}
.name-cell{display:flex;align-items:center;gap:10px}
.av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;font-family:monospace}
.name-text{font-weight:500}
.pill{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500}
.s-new{background:#0a1e30;color:#4aa3e8;border:1px solid #4aa3e830}
.s-contacted{background:#1e1a3f;color:#a99df8;border:1px solid #a99df830}
.s-qualified{background:#0f2d1f;color:#3dd68c;border:1px solid #3dd68c30}
.s-proposal{background:#2e1e05;color:#f5a62a;border:1px solid #f5a62a30}
.s-won{background:#052420;color:#2dd4bf;border:1px solid #2dd4bf30}
.s-lost{background:#2d0f0f;color:#f25c5c;border:1px solid #f25c5c30}
.act-btn{padding:4px 10px;font-size:12px;border:1px solid var(--border2);border-radius:var(--r);background:var(--bg4);color:var(--text2);cursor:pointer;font-family:inherit;transition:all 0.1s}
.act-btn:hover{background:var(--bg5);color:var(--text)}

.board{display:flex;gap:12px;overflow-x:auto;padding-bottom:10px;min-height:520px}
.col{flex:0 0 210px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--rxl);padding:12px;display:flex;flex-direction:column}
.col-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.col-dot{width:8px;height:8px;border-radius:50%}
.col-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.07em}
.col-badge{font-size:11px;padding:1px 7px;border-radius:20px;font-family:monospace}
.kcard{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rl);padding:11px 13px;margin-bottom:8px;cursor:pointer;transition:all 0.15s}
.kcard:hover{border-color:var(--border2);background:var(--bg4);transform:translateY(-1px)}
.kcard-name{font-size:13px;font-weight:500;margin-bottom:3px}
.kcard-co{font-size:11px;color:var(--text3);margin-bottom:7px}
.kcard-meta{display:flex;justify-content:space-between;align-items:center}
.kcard-vehicle{font-size:11px;color:var(--text2);background:var(--bg5);border-radius:4px;padding:2px 6px}
.kcard-owner{font-size:11px;color:var(--text3)}
.add-col-btn{margin-top:auto;padding:7px;border:1px dashed var(--border);border-radius:var(--r);background:none;color:var(--text3);cursor:pointer;font-size:12px;font-family:inherit;width:100%;text-align:left;transition:all 0.15s}
.add-col-btn:hover{border-color:var(--border2);color:var(--text2)}

.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:20px}
.sc{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:16px}
.sc-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px}
.sc-val{font-size:24px;font-weight:600;font-family:monospace}
.sc-sub{font-size:11px;color:var(--text3);margin-top:3px}

.modal-wrap{background:rgba(0,0,0,0.65);display:flex;align-items:center;justify-content:center;padding:20px;min-height:500px}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--rxl);padding:22px;width:100%;max-width:460px}
.modal-head{display:flex;align-items:center;gap:12px;margin-bottom:18px}
.modal h3{font-size:15px;font-weight:600}
.modal-close{margin-left:auto;background:none;border:none;color:var(--text3);font-size:20px;cursor:pointer;line-height:1}
.modal-close:hover{color:var(--text)}
.fl{display:grid;grid-template-columns:1fr 1fr;gap:0 14px}
.fr{margin-bottom:12px}
.fr label{display:block;font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:4px}
.fr input,.fr select,.fr textarea{width:100%;padding:8px 10px;font-size:13px;border:1px solid var(--border);border-radius:var(--r);background:var(--bg3);color:var(--text);font-family:inherit;outline:none;transition:border-color 0.15s}
.fr input:focus,.fr select:focus,.fr textarea:focus{border-color:var(--accent)}
.fr textarea{resize:vertical;min-height:55px}
.move-stages{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:16px}
.ms-btn{padding:4px 12px;border-radius:20px;font-size:12px;cursor:pointer;font-family:inherit;border:1px solid var(--border);background:transparent;color:var(--text2);transition:all 0.15s}
.ms-btn:hover{border-color:var(--border2);color:var(--text)}
.ms-btn.on{background:var(--adim);border-color:var(--accent);color:var(--accent2)}
.modal-actions{display:flex;justify-content:space-between;align-items:center;margin-top:6px}
.del-btn{padding:6px 12px;font-size:12px;border:1px solid var(--rdim);border-radius:var(--r);background:var(--rdim);color:var(--red);cursor:pointer;font-family:inherit}
.del-btn:hover{background:#3d1212}
.save-btn{padding:7px 16px;font-size:13px;border:none;border-radius:var(--r);background:var(--accent);color:#fff;cursor:pointer;font-family:inherit;font-weight:500}
.save-btn:hover{opacity:0.85}
.cancel-btn{padding:7px 14px;font-size:13px;border:1px solid var(--border);border-radius:var(--r);background:transparent;color:var(--text2);cursor:pointer;font-family:inherit}
.sec-title{font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin:14px 0 8px}
.detail-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px}
.detail-row:last-child{border-bottom:none}
.dl{color:var(--text3)}
.dr{color:var(--text);text-align:right}
.funnel-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.fl-label{font-size:12px;color:var(--text2);width:78px;text-align:right;flex-shrink:0}
.fl-track{flex:1;background:var(--bg4);border-radius:4px;height:18px;overflow:hidden}
.fl-bar{height:100%;border-radius:4px;display:flex;align-items:center;padding-left:8px;font-size:11px;font-weight:600;color:#fff}
.fl-count{font-size:12px;color:var(--text3);width:20px;font-family:monospace}
.activity-item{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.activity-item:last-child{border-bottom:none}
.act-ico{width:22px;height:22px;border-radius:50%;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--text3);flex-shrink:0;margin-top:1px}
.act-text{font-size:13px;color:var(--text)}
.act-time{font-size:11px;color:var(--text3);margin-top:2px}
</style>

<h2 class="sr-only">LeadFlow CRM — pipeline, contacts, and analytics</h2>

<div class="app">
<header>
  <div class="logo">
    <div class="logo-icon">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 11L5.5 7.5L8 10L12 5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    LeadFlow
  </div>
  <nav>
    <button class="tab on" onclick="switchTab('pipeline',this)">Pipeline</button>
    <button class="tab" onclick="switchTab('contacts',this)">Contacts</button>
    <button class="tab" onclick="switchTab('analytics',this)">Analytics</button>
  </nav>
  <div class="srch">
    <span class="srch-ico">⌕</span>
    <input id="srch" placeholder="Search leads..." oninput="render()">
  </div>
  <button class="add-btn" onclick="openAdd()">+ Add Lead</button>
</header>

<main>
  <div id="pipeline" class="view on"></div>
  <div id="contacts" class="view"></div>
  <div id="analytics" class="view"></div>
</main>
</div>

<div id="modal-root"></div>

<script>
const STAGES=['New','Contacted','Qualified','Proposal','Won','Lost'];
const SCOLS={New:'#4aa3e8',Contacted:'#a99df8',Qualified:'#3dd68c',Proposal:'#f5a62a',Won:'#2dd4bf',Lost:'#f25c5c'};
const SDIM={New:'#0a1e30',Contacted:'#1e1a3f',Qualified:'#0f2d1f',Proposal:'#2e1e05',Won:'#052420',Lost:'#2d0f0f'};
const SCLS={New:'s-new',Contacted:'s-contacted',Qualified:'s-qualified',Proposal:'s-proposal',Won:'s-won',Lost:'s-lost'};
const OWNERS=['Alex M.','Jordan B.','Riley K.','Sam T.'];
const SOURCES=['Website','Referral','LinkedIn','Cold Outreach','Trade Show','Google Ads','Email Campaign','Other'];
const TIMEFRAMES=['ASAP','1–2 weeks','1 month','2–3 months','3–6 months','6+ months'];
const AVCOLS=[['#1e1a3f','#a99df8'],['#0f2d1f','#3dd68c'],['#2e1e05','#f5a62a'],['#0a1e30','#4aa3e8'],['#052420','#2dd4bf'],['#2d0f0f','#f25c5c']];

let leads=[
  {id:1,name:'Sarah Chen',phone:'312-555-0182',vehicle:'2023 BMW X5',service:'Full Detail',timeframe:'1–2 weeks',source:'Website',stage:'Proposal',owner:'Alex M.',notes:'Interested in monthly plan.',tags:['Hot'],created:'2026-03-10'},
  {id:2,name:'Marcus Webb',phone:'415-555-0234',vehicle:'2021 Ford F-150',service:'Paint Correction',timeframe:'1 month',source:'Referral',stage:'Qualified',owner:'Jordan B.',notes:'Referred by Sarah.',tags:['SMB'],created:'2026-03-15'},
  {id:3,name:'Priya Kapoor',phone:'312-555-0091',vehicle:'2022 Tesla Model S',service:'Ceramic Coat',timeframe:'ASAP',source:'LinkedIn',stage:'Won',owner:'Alex M.',notes:'Closed Q1.',tags:[],created:'2026-02-01'},
  {id:4,name:'Tom Deluca',phone:'630-555-0345',vehicle:'2020 Chevy Tahoe',service:'Interior Detail',timeframe:'2–3 months',source:'Cold Outreach',stage:'New',owner:'Riley K.',notes:'',tags:[],created:'2026-04-01'},
  {id:5,name:'Elena Voss',phone:'847-555-0123',vehicle:'2024 Mercedes GLE',service:'Window Tint',timeframe:'1–2 weeks',source:'Trade Show',stage:'Contacted',owner:'Sam T.',notes:'Met at NRF 2026.',tags:['Retail'],created:'2026-03-28'},
  {id:6,name:"James O'Brien",phone:'708-555-0267',vehicle:'2019 Dodge Ram',service:'Full Detail',timeframe:'6+ months',source:'Website',stage:'Lost',owner:'Jordan B.',notes:'Went with competitor.',tags:[],created:'2026-02-20'},
  {id:7,name:'Aisha Grant',phone:'773-555-0399',vehicle:'2023 Honda Pilot',service:'Ceramic Coat',timeframe:'1 month',source:'Referral',stage:'Qualified',owner:'Riley K.',notes:'Budget approved.',tags:['Hot'],created:'2026-04-05'},
  {id:8,name:'Derek Ng',phone:'312-555-0512',vehicle:'2022 Lexus RX',service:'Paint Correction',timeframe:'ASAP',source:'Google Ads',stage:'New',owner:'Sam T.',notes:'',tags:[],created:'2026-04-08'},
];
let activity=[
  {id:1,time:'Apr 12, 10:30 AM',text:'Sarah Chen moved to Proposal',icon:'→'},
  {id:2,time:'Apr 11, 3:00 PM',text:'Aisha Grant marked Qualified',icon:'✓'},
  {id:3,time:'Apr 10, 9:15 AM',text:'Derek Ng added as new lead',icon:'+'},
  {id:4,time:'Apr 9, 2:00 PM',text:'Priya Kapoor deal won',icon:'★'},
  {id:5,time:'Apr 8, 11:30 AM',text:"James O'Brien marked Lost",icon:'✕'},
];
let nextId=9;
let curTab='pipeline';
let sort={k:'name',d:1};
let modal=null;

function ini(name){return name.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase()}
function avc(name){const i=name.split('').reduce((a,c)=>a+c.charCodeAt(0),0)%AVCOLS.length;return AVCOLS[i]}
function nowStr(){return new Date().toLocaleString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'})}
function q(){return (document.getElementById('srch').value||'').toLowerCase()}
function addAct(text,icon){activity.unshift({id:Date.now(),time:nowStr(),text,icon});if(activity.length>30)activity.pop()}

function switchTab(tab,btn){
  curTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  btn.classList.add('on');
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('on'));
  document.getElementById(tab).classList.add('on');
  render();
}

function render(){
  if(curTab==='pipeline') renderPipeline();
  else if(curTab==='contacts') renderContacts();
  else renderAnalytics();
}

function renderPipeline(){
  const sq=q();
  const fl=leads.filter(l=>!sq||(l.name+l.phone+l.vehicle).toLowerCase().includes(sq));
  document.getElementById('pipeline').innerHTML=`<div class="board">${STAGES.map(stage=>{
    const cards=fl.filter(l=>l.stage===stage);
    const [bg,fg]=avc(stage);
    return `<div class="col">
      <div class="col-head">
        <div style="display:flex;align-items:center;gap:6px">
          <div class="col-dot" style="background:${SCOLS[stage]}"></div>
          <span class="col-title" style="color:${SCOLS[stage]}">${stage}</span>
        </div>
        <span class="col-badge" style="background:${SDIM[stage]};color:${SCOLS[stage]}">${cards.length}</span>
      </div>
      ${cards.map(l=>{const[ab,af]=avc(l.name);return`<div class="kcard" onclick="openEdit(${l.id})">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
          <div class="av" style="background:${ab};color:${af}">${ini(l.name)}</div>
          <div>
            <div class="kcard-name">${l.name}</div>
            <div class="kcard-co">${l.phone}</div>
          </div>
        </div>
        <div class="kcard-meta">
          <span class="kcard-vehicle">${l.vehicle}</span>
          <span class="kcard-owner">${l.owner.split(' ')[0]}</span>
        </div>
        ${l.service?`<div style="font-size:11px;color:var(--text3);margin-top:5px">${l.service} · ${l.timeframe}</div>`:''}
      </div>`}).join('')}
      <button class="add-col-btn" onclick="openAdd('${stage}')">+ Add lead</button>
    </div>`;
  }).join('')}</div>`;
}

function renderContacts(){
  const sq=q();
  const flt=document.getElementById('cflt')?document.getElementById('cflt').value:'';
  const fl=leads
    .filter(l=>(!sq||(l.name+l.phone+l.vehicle+l.service).toLowerCase().includes(sq))&&(!flt||l.stage===flt))
    .sort((a,b)=>{let av=a[sort.k],bv=b[sort.k];if(typeof av==='string'){av=av.toLowerCase();bv=bv.toLowerCase()}return av<bv?-sort.d:av>bv?sort.d:0});
  const col=(label,k,w)=>`<th style="width:${w}" onclick="sortBy('${k}')">${label}${sort.k===k?(sort.d===1?' ↑':' ↓'):''}</th>`;
  document.getElementById('contacts').innerHTML=`
    <div class="toolbar">
      <select class="filt" id="cflt" onchange="render()">
        <option value="">All stages</option>
        ${STAGES.map(s=>`<option ${s===flt?'selected':''}>${s}</option>`).join('')}
      </select>
      <span class="count">${fl.length} leads</span>
    </div>
    <div class="tbl-wrap">
      <table>
        <thead><tr>
          ${col('Name','name','22%')}
          ${col('Phone','phone','15%')}
          ${col('Vehicle','vehicle','18%')}
          ${col('Service','service','14%')}
          ${col('Timeframe','timeframe','13%')}
          ${col('Source','source','11%')}
          <th style="width:7%"></th>
        </tr></thead>
        <tbody>
          ${fl.length===0?`<tr><td colspan="7" style="text-align:center;padding:32px;color:var(--text3)">No leads found</td></tr>`
          :fl.map(l=>{const[ab,af]=avc(l.name);return`<tr onclick="openEdit(${l.id})">
            <td><div class="name-cell"><div class="av" style="background:${ab};color:${af}">${ini(l.name)}</div><div><div class="name-text">${l.name}</div><div style="font-size:11px;color:var(--text3)">${l.stage?`<span class="pill ${SCLS[l.stage]}">${l.stage}</span>`:''}</div></div></div></td>
            <td style="color:var(--text2)">${l.phone||'—'}</td>
            <td style="color:var(--text2);font-size:12px">${l.vehicle||'—'}</td>
            <td style="color:var(--text2);font-size:12px">${l.service||'—'}</td>
            <td><span style="background:var(--bg4);border-radius:4px;padding:2px 7px;font-size:11px;color:var(--text2)">${l.timeframe||'—'}</span></td>
            <td style="color:var(--text3);font-size:12px">${l.source||'—'}</td>
            <td><button class="act-btn" onclick="event.stopPropagation();openEdit(${l.id})">Edit</button></td>
          </tr>`}).join('')}
        </tbody>
      </table>
    </div>`;
}

function sortBy(k){sort={k,d:sort.k===k?-sort.d:1};render()}

function renderAnalytics(){
  const won=leads.filter(l=>l.stage==='Won');
  const active=leads.filter(l=>!['Won','Lost'].includes(l.stage));
  const closed=leads.filter(l=>['Won','Lost'].includes(l.stage)).length;
  const wr=closed?Math.round(won.length/closed*100):0;
  const maxC=Math.max(...STAGES.map(s=>leads.filter(l=>l.stage===s).length),1);
  const srcMap={};leads.forEach(l=>{srcMap[l.source]=(srcMap[l.source]||0)+1});
  const topSrc=Object.entries(srcMap).sort((a,b)=>b[1]-a[1]).slice(0,5);
  document.getElementById('analytics').innerHTML=`
    <div class="stats">
      <div class="sc"><div class="sc-label">Total leads</div><div class="sc-val">${leads.length}</div></div>
      <div class="sc"><div class="sc-label">Active pipeline</div><div class="sc-val" style="color:var(--blue)">${active.length}</div><div class="sc-sub">open deals</div></div>
      <div class="sc"><div class="sc-label">Won deals</div><div class="sc-val" style="color:var(--green)">${won.length}</div></div>
      <div class="sc"><div class="sc-label">Win rate</div><div class="sc-val" style="color:${wr>50?'var(--green)':'var(--amber)'}">${wr}%</div></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px">
      <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:16px">
        <div class="sec-title">Pipeline funnel</div>
        ${STAGES.map(s=>{const c=leads.filter(l=>l.stage===s).length;const p=Math.round(c/maxC*100);return`<div class="funnel-row"><span class="fl-label">${s}</span><div class="fl-track"><div class="fl-bar" style="width:${p}%;background:${SCOLS[s]}">${c>0?c:''}</div></div><span class="fl-count">${c}</span></div>`}).join('')}
      </div>
      <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:16px">
        <div class="sec-title">Top sources</div>
        ${topSrc.map(([src,cnt])=>`<div class="funnel-row"><span class="fl-label" style="font-size:11px">${src}</span><div class="fl-track"><div class="fl-bar" style="width:${Math.round(cnt/leads.length*100)}%;background:var(--accent)">${cnt}</div></div><span class="fl-count">${cnt}</span></div>`).join('')}
      </div>
    </div>
    <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:16px">
      <div class="sec-title">Recent activity</div>
      ${activity.slice(0,8).map(a=>`<div class="activity-item"><div class="act-ico">${a.icon}</div><div><div class="act-text">${a.text}</div><div class="act-time">${a.time}</div></div></div>`).join('')}
    </div>`;
}

function openAdd(stage='New'){
  showModal({stage});
}
function openEdit(id){
  showModal(leads.find(l=>l.id===id));
}

function showModal(lead){
  const isNew=!lead?.id;
  const d={name:'',phone:'',vehicle:'',service:'',timeframe:TIMEFRAMES[0],source:SOURCES[0],stage:'New',owner:OWNERS[0],notes:'',...lead};
  document.getElementById('modal-root').innerHTML=`
    <div class="modal-wrap">
      <div class="modal">
        <div class="modal-head">
          ${!isNew?`<div class="av" style="background:${avc(d.name)[0]};color:${avc(d.name)[1]}">${ini(d.name||'?')}</div>`:''}
          <h3>${isNew?'Add new lead':d.name}</h3>
          <button class="modal-close" onclick="closeModal()">×</button>
        </div>
        <div class="fl">
          <div class="fr" style="grid-column:span 2"><label>Name *</label><input id="f-name" value="${d.name}" placeholder="Full name"></div>
          <div class="fr"><label>Phone</label><input id="f-phone" value="${d.phone}" placeholder="555-000-0000"></div>
          <div class="fr"><label>Stage</label><select id="f-stage">${STAGES.map(s=>`<option ${s===d.stage?'selected':''}>${s}</option>`).join('')}</select></div>
          <div class="fr"><label>Vehicle</label><input id="f-vehicle" value="${d.vehicle}" placeholder="Year Make Model"></div>
          <div class="fr"><label>Service</label><input id="f-service" value="${d.service}" placeholder="Detail, Ceramic, etc."></div>
          <div class="fr"><label>Timeframe</label><select id="f-timeframe">${TIMEFRAMES.map(t=>`<option ${t===d.timeframe?'selected':''}>${t}</option>`).join('')}</select></div>
          <div class="fr"><label>Source</label><select id="f-source">${SOURCES.map(s=>`<option ${s===d.source?'selected':''}>${s}</option>`).join('')}</select></div>
          <div class="fr"><label>Owner</label><select id="f-owner">${OWNERS.map(o=>`<option ${o===d.owner?'selected':''}>${o}</option>`).join('')}</select></div>
          <div class="fr" style="grid-column:span 2"><label>Notes</label><textarea id="f-notes">${d.notes}</textarea></div>
        </div>
        ${!isNew?`<div class="sec-title">Move stage</div><div class="move-stages">${STAGES.map(s=>`<button class="ms-btn${s===d.stage?' on':''}" onclick="moveStage(${d.id},'${s}',this)">${s}</button>`).join('')}</div>`:''}
        <div class="modal-actions">
          ${!isNew?`<button class="del-btn" onclick="deleteLead(${d.id})">Delete</button>`:'<span></span>'}
          <div style="display:flex;gap:8px">
            <button class="cancel-btn" onclick="closeModal()">Cancel</button>
            <button class="save-btn" onclick="saveLead(${d.id||'null'})">${isNew?'Add Lead':'Save'}</button>
          </div>
        </div>
      </div>
    </div>`;
}

function saveLead(id){
  const name=document.getElementById('f-name').value.trim();
  if(!name){alert('Name is required');return}
  const data={name,phone:document.getElementById('f-phone').value,vehicle:document.getElementById('f-vehicle').value,service:document.getElementById('f-service').value,timeframe:document.getElementById('f-timeframe').value,source:document.getElementById('f-source').value,stage:document.getElementById('f-stage').value,owner:document.getElementById('f-owner').value,notes:document.getElementById('f-notes').value,tags:[]};
  if(id){
    const old=leads.find(l=>l.id===id);
    Object.assign(old,data);
    addAct(`${name} updated`,'✎');
  } else {
    leads.push({id:nextId++,...data,created:new Date().toISOString().split('T')[0]});
    addAct(`${name} added as new lead`,'+');
  }
  closeModal();render();
}

function moveStage(id,stage,btn){
  const l=leads.find(x=>x.id===id);if(!l)return;
  const old=l.stage;l.stage=stage;
  addAct(`${l.name} → ${stage}`,'→');
  document.querySelectorAll('.ms-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  render();
}

function deleteLead(id){
  if(!confirm('Delete this lead?'))return;
  const l=leads.find(x=>x.id===id);
  if(l)addAct(`${l.name} deleted`,'✕');
  leads=leads.filter(x=>x.id!==id);
  closeModal();render();
}

function closeModal(){document.getElementById('modal-root').innerHTML=''}
function openAdd(stage='New'){showModal({stage})}

render();
</script>
